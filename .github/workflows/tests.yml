on: [push]
name: CI
jobs:
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Prettier check
        run: npx prettier --check "src/**/*.{ts,tsx,js,json,md}"

      - name: Bundle build
        run: npm run bundle:build

  stack:
    name: Stack Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: haskell-actions/setup@v2
        with:
          enable-stack: true
          stack-version: "latest"

      - uses: actions/cache@v4
        name: Cache ~/.stack (global package store)
        with:
          path: ~/.stack
          key: ${{ runner.os }}-stack-global-lts-24.46
          restore-keys: |
            ${{ runner.os }}-stack-global-

      - uses: actions/cache@v4
        name: Cache .stack-work (project build artifacts)
        with:
          path: .stack-work
          key: ${{ runner.os }}-stack-work-${{ hashFiles('stack.yaml', 'stack.yaml.lock', 'package.yaml') }}
          restore-keys: |
            ${{ runner.os }}-stack-work-

      - name: Build
        run: |
          stack build --stack-yaml stack.yaml --test --bench --no-run-tests --no-run-benchmarks --fast

      - name: Test
        run: |
          stack test --stack-yaml stack.yaml --fast
