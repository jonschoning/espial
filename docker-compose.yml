services:
  espial:
    image: '${HUB_REPO:-localhost}/${APPIMAGE:-espial:espial}'
    restart: unless-stopped
    build:
      context: .
      dockerfile: ${ESPIAL_DOCKERFILE:-./Dockerfile}
    ports:
      - "3000:3000"
    volumes:
      - '${DATA:-.}:/app/data'
    environment:
      PORT: 3000
      SQLITE_DATABASE: /app/data/espial.sqlite3
      IP_FROM_HEADER: false
      CLIENT_SESSION_KEY: ${CLIENT_SESSION_KEY}
      # SSL_ONLY: false
      # Optional: enable in-process TLS (reverse proxy is recommended; see README § TLS / Reverse Proxy)
      # TLS_CERT_FILE: /app/data/tls/cert.pem
      # TLS_KEY_FILE: /app/data/tls/key.pem
      SHOULD_LOG_ALL: ${SHOULD_LOG_ALL:-false}
      # DETAILED_LOGGING: false
      # ALLOW_NON_HTTP_URL_SCHEMES: false
      # SOURCE_CODE_URI: https://github.com/jonschoning/espial
      # ARCHIVE_SOCKS_PROXY_HOST: localhost
      # ARCHIVE_SOCKS_PROXY_PORT: 8888

      ARCHIVE_BACKEND: ${ARCHIVE_BACKEND:-disabled}
      # ARCHIVE_BACKEND: wayback-machine
      # WAYBACK_MACHINE_ACCESS_KEY: ACCESS_KEY
      # WAYBACK_MACHINE_SECRET_KEY: SECRET_KEY