services:
  espial:
    image: '$HUB_REPO/$APPIMAGE'
    build:
      context: .
      dockerfile: ./Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - '$DATA:/app/data'
    environment:
      - PORT=3000
      - SQLITE_DATABASE=/app/data/espial.sqlite3
      - IP_FROM_HEADER=true
      # - SSL_ONLY=false
      # - SHOULD_LOG_ALL=false
      # - DETAILED_LOGGING=false
      # - ALLOW_NON_HTTP_URL_SCHEMES=false
      # - SOURCE_CODE_URI=https://github.com/jonschoning/espial
      # - ARCHIVE_SOCKS_PROXY_HOST=localhost 
      # - ARCHIVE_SOCKS_PROXY_PORT=8888

      - ARCHIVE-BACKEND=disabled
      # - ARCHIVE-BACKEND=wayback-machine
      # - WAYBACK-MACHINE-ACCESS-KEY=ACCESS_KEY
      # - WAYBACK-MACHINE-SECRET-KEY=SECRET_KEY